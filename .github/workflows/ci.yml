name: CI/CD Pipeline

on:
  push:
    branches:
      - master

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login To Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Backend Image
        run: docker build -t sauravdeshmane/ticket-backend ./app

      - name: Push Backend Image
        run: docker push sauravdeshmane/ticket-backend

      - name: Build Frontend Image
        run: docker build -t sauravdeshmane/ticket-frontend ./frontend/frontend

      - name: Push Frontend Image
        run: docker push sauravdeshmane/ticket-frontend